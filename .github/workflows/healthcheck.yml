name: Echo Healthcheck

# Runs every 15 minutes against production endpoints. If any check fails
# the workflow opens (or updates) a GitHub Issue tagged `incident` so the
# team gets a paged-on-call signal even when we're not actively watching
# the status pages.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    outputs:
      supabase_ok: ${{ steps.supabase.outputs.ok }}
      fastapi_ok: ${{ steps.fastapi.outputs.ok }}
      failure_summary: ${{ steps.summary.outputs.text }}
    steps:
      - name: Ping Supabase REST
        id: supabase
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "ok=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $EXPO_PUBLIC_SUPABASE_ANON_KEY" \
            "${EXPO_PUBLIC_SUPABASE_URL%/}/rest/v1/" || echo "000")
          echo "Supabase REST -> $code"
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "404" ]; then
            # 401/404 still means the server is up and routing — only
            # network errors / 5xx are real failures here.
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping FastAPI /health
        id: fastapi
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          set -o pipefail
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "ok=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            "${EXPO_PUBLIC_API_URL%/}/health" || echo "000")
          echo "FastAPI /health -> $code"
          if [ "$code" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build failure summary
        id: summary
        run: |
          parts=""
          if [ "${{ steps.supabase.outputs.ok }}" = "false" ]; then
            parts="${parts}- Supabase REST is failing\n"
          fi
          if [ "${{ steps.fastapi.outputs.ok }}" = "false" ]; then
            parts="${parts}- FastAPI /health is failing\n"
          fi
          {
            echo "text<<EOF"
            printf "%b" "$parts"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  open_issue_on_failure:
    needs: ping
    if: ${{ needs.ping.outputs.supabase_ok == 'false' || needs.ping.outputs.fastapi_ok == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Open / update incident issue
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ needs.ping.outputs.failure_summary }}
        with:
          script: |
            const title = '🚨 Healthcheck failure — production endpoints unhealthy';
            const body =
              `Automated healthcheck detected a failure.\n\n` +
              `${process.env.SUMMARY || '(no detail)'}` +
              `\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}` +
              `\n\nRunbook: docs/runbook/monitoring.md`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,healthcheck',
              per_page: 5,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'healthcheck'],
              });
            }
