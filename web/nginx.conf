# Serves the Expo static web export. Listens on 3000 to match the compose
# mapping and the old stack's port.
server {
    listen       3000;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip text assets.
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Hashed static assets (Expo emits content-hashed filenames) can be
    # cached aggressively.
    location /_expo/ {
        expires   1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /assets/ {
        expires   1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Expo Router "static" output writes an .html file per route. Fall back
    # through the route's .html, then its directory index, then the SPA root.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Never cache the HTML shell so OTA-style redeploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
